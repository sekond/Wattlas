name: Refresh data

# Rebuilds every view's JSON from fresh data and commits to main.
# The site (GitHub Pages from main) then redeploys automatically.
# Sources: ENTSO-E (prices, generation, flows) + netztransparenz (curtailment).
on:
  schedule:
    # 05:17 UTC daily = 06:17 CET / 07:17 CEST — after the previous day has
    # closed and published. Cron is UTC and best-effort (may be delayed).
    - cron: "17 5 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab / gh CLI

permissions:
  contents: write          # needed to push the refreshed data back to main

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build all views (live fetch)
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          # netztransparenz OAuth client for the Curtailment view (Phase 4).
          # If these secrets are absent, build_curtailment.py exits cleanly and
          # writes a status:"unavailable" artefact — the rest still build.
          NETZTRANSPARENZ_CLIENT_ID: ${{ secrets.NETZTRANSPARENZ_CLIENT_ID }}
          NETZTRANSPARENZ_CLIENT_SECRET: ${{ secrets.NETZTRANSPARENZ_CLIENT_SECRET }}
        run: |
          # ENTSO-E views. build_mix caches per-zone generation; build_divergence
          # caches zone prices — the builders that read those caches
          # (build_carbon, build_mismatch_zones, build_zone_views) MUST run after
          # them in the same job, since the *_raw_*.parquet caches are gitignored
          # and don't persist between runs.
          python pipeline/build_spread.py
          python pipeline/build_pulse.py
          python pipeline/build_divergence.py
          python pipeline/build_mismatch.py
          python pipeline/build_mix.py
          python pipeline/build_carbon.py            # reads the generation cache from build_mix
          python pipeline/build_mismatch_zones.py    # wind+solar from the generation cache + per-zone load
          python pipeline/build_flows.py
          python pipeline/build_zone_views.py        # reads the zone-price cache from build_divergence
          python pipeline/build_history.py --years 3
          # Nordic price-zones slice (v5): day-ahead prices for the 12 Nordic bidding
          # zones (ENTSO-E). Isolated builder; non-fatal so a Nordic fetch hiccup
          # can't break the core refresh.
          python pipeline/build_nordic_zones.py || echo "Nordic zones build skipped/failed — continuing"
          # New external sources (isolated): never let one fail the whole refresh.
          python pipeline/build_curtailment.py --years 2 || echo "curtailment build skipped/failed — continuing"
          # Wasted-wind Panel 2: per-control-area net balance from SMARD (open, no key).
          python pipeline/build_regional_balance.py || echo "regional balance (SMARD) build skipped/failed — continuing"
          # France-nuclear slice (v4): éCO2mix régional + national via ODRÉ (open, no key);
          # the fleet is a committed static list. All isolated and non-fatal.
          python pipeline/build_fr_nuclear_sites.py || echo "FR fleet build skipped/failed — continuing"
          python pipeline/build_fr_costs.py || echo "FR costs build skipped/failed — continuing"
          python pipeline/build_fr_regional.py || echo "FR régional (éCO2mix) build skipped/failed — continuing"
          python pipeline/build_fr_nuclear_availability.py || echo "FR availability (éCO2mix) build skipped/failed — continuing"
          # UK regional slice (v6): NESO Carbon Intensity (regional consumption-based carbon)
          # + NESO Constraint Breakdown (Scottish wind constraint payments). Open APIs (no
          # key), isolated, non-fatal — a UK source hiccup must not break the refresh.
          python pipeline/build_uk_regional_carbon.py || echo "UK regional carbon (NESO) build skipped/failed — continuing"
          python pipeline/build_uk_constraints.py || echo "UK constraints (NESO) build skipped/failed — continuing"

      - name: Build MaStR capacity (weekly — heavy bulk download)
        run: |
          # Wasted-wind Panel 1. The MaStR Gesamtdatenexport is large (~1.5 GB) and
          # installed capacity changes slowly, so this refreshes WEEKLY (Mondays) or on
          # manual dispatch — not every day. Isolated and non-fatal: a failure here must
          # never break the daily refresh. Uses the committed basemap + crosswalk.
          if [ "$(date -u +%u)" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pip install open-mastr
            python pipeline/build_mastr_capacity.py || echo "MaStR capacity build skipped/failed — continuing"
          else
            echo "MaStR capacity refreshes weekly (Mondays); skipping today."
          fi

      - name: Commit refreshed data (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data; then
            echo "No data changes — nothing to commit."
          else
            git add data/*.json
            git commit -m "Auto-refresh data ($(date -u +%Y-%m-%d))"
            git push origin main
          fi
