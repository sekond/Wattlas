name: Refresh data

# Rebuilds every view's JSON from fresh data and commits to main.
# The site (GitHub Pages from main) then redeploys automatically.
# Sources: ENTSO-E (prices, generation, flows) + netztransparenz (curtailment).
on:
  schedule:
    # 05:17 UTC daily = 06:17 CET / 07:17 CEST — after the previous day has
    # closed and published. Cron is UTC and best-effort (may be delayed).
    - cron: "17 5 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab / gh CLI

permissions:
  contents: write          # needed to push the refreshed data back to main

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build all views (live fetch)
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          # netztransparenz OAuth client for the Curtailment view (Phase 4).
          # If these secrets are absent, build_curtailment.py exits cleanly and
          # writes a status:"unavailable" artefact — the rest still build.
          NETZTRANSPARENZ_CLIENT_ID: ${{ secrets.NETZTRANSPARENZ_CLIENT_ID }}
          NETZTRANSPARENZ_CLIENT_SECRET: ${{ secrets.NETZTRANSPARENZ_CLIENT_SECRET }}
        run: |
          # ENTSO-E views. build_mix caches per-zone generation; build_divergence
          # caches zone prices — the two builders that read those caches
          # (build_carbon, build_zone_views) MUST run after them in the same job,
          # since the *_raw_*.parquet caches are gitignored and don't persist.
          python pipeline/build_spread.py
          python pipeline/build_pulse.py
          python pipeline/build_divergence.py
          python pipeline/build_mismatch.py
          python pipeline/build_mix.py
          python pipeline/build_carbon.py        # reads the generation cache from build_mix
          python pipeline/build_flows.py
          python pipeline/build_zone_views.py    # reads the zone-price cache from build_divergence
          python pipeline/build_history.py --years 3
          # New external source (isolated): never let it fail the whole refresh.
          python pipeline/build_curtailment.py --years 2 || echo "curtailment build skipped/failed — continuing"

      - name: Commit refreshed data (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data; then
            echo "No data changes — nothing to commit."
          else
            git add data/*.json
            git commit -m "Auto-refresh data ($(date -u +%Y-%m-%d))"
            git push origin main
          fi
