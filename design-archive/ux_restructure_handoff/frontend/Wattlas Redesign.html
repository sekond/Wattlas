<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wattlas — UX Restructure Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5; --surface:#ffffff; --surface-2:#f3f1ea; --surface-3:#ece9df;
  --text:#2b2a27; --muted:#5f5e5a; --hint:#8a8880; --border:rgba(43,42,39,.13); --border-2:rgba(43,42,39,.08);
  /* section accents — shared chroma/lightness, varied hue */
  --s-blue:oklch(.50 .10 248); --s-green:oklch(.50 .10 150); --s-amber:oklch(.55 .10 75);
  --s-red:oklch(.52 .12 28); --s-plum:oklch(.50 .10 312);
  --serif:"Newsreader",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --radius:14px; --radius-sm:9px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit}
canvas{max-width:100%}

/* ---------- shell ---------- */
.shell{display:grid;grid-template-columns:268px minmax(0,1fr);height:100vh}
.side{position:relative;border-right:.5px solid var(--border);background:var(--bg);display:flex;flex-direction:column;
  padding:24px 14px 16px 20px;overflow-y:auto;z-index:40}
.content{overflow-y:auto;scroll-behavior:smooth}
.content-inner{max-width:1000px;margin:0 auto;padding:40px 48px 110px}

/* ---------- sidebar nav ---------- */
.brandlink{display:flex;align-items:center;gap:10px;text-decoration:none;margin:0 0 16px 6px}
.brandlink .mark{font-size:22px;line-height:1;color:var(--text)}
.brandlink .bt{font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
.brandlink small{display:block;color:var(--hint);font-weight:400;font-size:11.5px;letter-spacing:0}
.navmode{display:flex;gap:3px;background:var(--surface-2);border-radius:8px;padding:3px;margin:0 0 14px}
.navmode button{flex:1;font:inherit;font-size:11.5px;font-weight:500;padding:5px 8px;border:none;background:transparent;
  color:var(--muted);border-radius:6px;cursor:pointer}
.navmode button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.snav{display:flex;flex-direction:column;gap:1px}
.nlink{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--muted);font-size:13.5px;
  padding:8px 10px;border-radius:8px;border-left:2px solid transparent}
.nlink .ni{width:16px;text-align:center;color:var(--hint);font-size:12px;flex:none}
.nlink .ni.mono{font-variant-numeric:tabular-nums;font-size:9.5px;font-weight:600}
.nlink:hover{color:var(--text);background:var(--surface-2)}
.nlink.active{color:var(--text);font-weight:600;background:var(--surface-2);border-left-color:var(--text)}
.nlink.flat{font-size:12.5px;padding:6px 10px}
.ngroup{margin-top:10px;--ga:var(--text)}
.ghead{display:block;text-decoration:none;padding:7px 10px 6px;border-radius:8px;border-left:2px solid transparent}
.ghead .gn{font-variant-numeric:tabular-nums;font-size:10px;font-weight:600;color:var(--ga);letter-spacing:.04em}
.ghead .gt{display:block;font-size:13.5px;font-weight:600;color:var(--text);margin-top:1px}
.ghead .gq{display:block;font-size:11px;color:var(--hint);font-weight:400;line-height:1.3;margin-top:1px}
.ghead:hover{background:var(--surface-2)}
.ghead.active{background:var(--surface-2);border-left-color:var(--ga)}
.gkids{display:none;flex-direction:column;gap:0;margin:2px 0 4px 0;padding-left:11px;
  border-left:1.5px solid var(--border-2);margin-left:11px}
.gkids.open{display:flex}
.nkid{text-decoration:none;color:var(--muted);font-size:12.5px;padding:5px 10px;border-radius:7px}
.nkid:hover{color:var(--text);background:var(--surface-2)}
.nkid.active{color:var(--text);font-weight:600;background:var(--surface-2)}
.ogroup{font-size:9.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--hint);margin:14px 0 5px 10px}
.oflat-note{font-size:11px;color:var(--hint);font-style:italic;line-height:1.5;margin:14px 10px 0;padding-top:12px;border-top:.5px solid var(--border)}
.nfoot{margin-top:auto;padding:18px 8px 0;font-size:10.5px;color:var(--hint);line-height:1.6}

/* ---------- buttons / shared ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--text);color:var(--bg);text-decoration:none;
  font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:999px}
.btn:hover{background:#000}
.btn.ghost{background:transparent;color:var(--muted);border:.5px solid var(--border)}
.btn.ghost:hover{color:var(--text);border-color:var(--hint);background:transparent}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--hint);margin:0 0 14px}
.crumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--hint);margin-bottom:26px}
.crumb a{color:var(--muted);text-decoration:none}.crumb a:hover{color:var(--text)}
.crumb span{color:var(--hint)}

/* ---------- HOME ---------- */
.home-hero{max-width:760px;margin:6px 0 46px}
.home-hero h1{font-family:var(--serif);font-weight:500;font-size:52px;line-height:1.06;letter-spacing:-.015em;margin:0 0 20px}
.home-hero h1 em{font-style:italic;color:var(--s-amber)}
.home-hero .lead{font-size:17px;color:var(--muted);max-width:62ch;margin:0 0 26px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.five-head{display:flex;align-items:center;gap:16px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);margin:0 0 18px}
.five-head .rule{flex:1;height:.5px;background:var(--border)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.scard{display:flex;flex-direction:column;text-decoration:none;background:var(--surface);border:.5px solid var(--border);
  border-radius:var(--radius);padding:22px 22px 20px;transition:box-shadow .16s ease,transform .16s ease;position:relative;overflow:hidden}
.scard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--a)}
.scard:hover{box-shadow:0 6px 26px rgba(43,42,39,.09);transform:translateY(-2px)}
.scard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.scard .sn{font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--a);letter-spacing:.04em}
.scard .thumb{width:120px;height:72px;opacity:.92}
.scard .sq{font-size:12.5px;font-weight:600;color:var(--a);margin:0 0 4px;letter-spacing:.005em}
.scard h2{font-family:var(--serif);font-weight:500;font-size:27px;line-height:1.1;margin:0 0 8px}
.scard .sl{font-size:13.5px;color:var(--muted);margin:0 0 16px;line-height:1.55}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
.chip{font-size:11px;color:var(--muted);background:var(--surface-2);border-radius:999px;padding:4px 10px;white-space:nowrap}
.home-note{margin-top:40px;padding:26px 28px;background:var(--surface-2);border-radius:var(--radius)}
.home-note h3{font-family:var(--serif);font-weight:500;font-size:20px;margin:0 0 8px}
.home-note p{font-size:14px;color:var(--muted);margin:0;max-width:78ch}
.home-note a{color:var(--text);font-weight:500;text-decoration:none;border-bottom:1px solid var(--border)}

/* ---------- SECTION HUB ---------- */
.sec-hero{position:relative;padding:6px 0 30px 22px;margin-bottom:6px}
.sec-hero::before{content:"";position:absolute;left:0;top:8px;bottom:30px;width:3px;background:var(--a);border-radius:2px}
.sec-n{font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--a);letter-spacing:.08em}
.sec-q{font-size:15px;font-weight:600;color:var(--a);margin:6px 0 6px}
.sec-hero h1{font-family:var(--serif);font-weight:500;font-size:44px;line-height:1.08;letter-spacing:-.015em;margin:0 0 14px}
.sec-lede{font-size:16px;color:var(--muted);max-width:66ch;margin:0}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:30px}
.vcard{display:flex;flex-direction:column;text-decoration:none;background:var(--surface);border:.5px solid var(--border);
  border-radius:var(--radius);padding:20px;transition:box-shadow .16s ease,transform .16s ease}
.vcard:hover{box-shadow:0 6px 22px rgba(43,42,39,.08);transform:translateY(-2px)}
.vcard-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.vcard-head h3{font-family:var(--serif);font-weight:500;font-size:21px;margin:0}
.vtag{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
  background:var(--surface-2);border-radius:999px;padding:4px 9px;white-space:nowrap;flex:none}
.vtag.map{color:var(--s-amber);background:color-mix(in oklch,var(--s-amber) 12%,var(--surface-2))}
.vtag.historical{color:var(--s-red);background:color-mix(in oklch,var(--s-red) 12%,var(--surface-2))}
.vtag.model{color:var(--s-plum);background:color-mix(in oklch,var(--s-plum) 12%,var(--surface-2))}
.vone{font-size:13.5px;color:var(--muted);margin:0 0 16px;line-height:1.5}
.vstat{display:flex;flex-direction:column;gap:1px;margin-top:auto;padding-top:14px;border-top:.5px solid var(--border-2)}
.vstat .vs-val{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--a);line-height:1}
.vstat .vs-lbl{font-size:11.5px;color:var(--hint)}
.next-sec{display:flex;flex-direction:column;gap:3px;text-decoration:none;margin-top:34px;padding:22px 24px;
  border:.5px solid var(--border);border-radius:var(--radius);background:var(--surface);position:relative;overflow:hidden}
.next-sec::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--a)}
.next-sec:hover{background:var(--surface-2)}
.ns-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hint)}
.ns-title{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--text)}
.ns-sub{font-size:13px;color:var(--a);font-weight:600}

/* ---------- VIEW DETAIL ---------- */
.view-hero{padding:0 0 24px;border-bottom:.5px solid var(--border);margin-bottom:26px}
.vh-q{font-size:13px;font-weight:600;color:var(--a)}
.view-hero h1{font-family:var(--serif);font-weight:500;font-size:40px;line-height:1.08;margin:8px 0 10px}
.vh-one{font-size:16px;color:var(--muted);max-width:66ch;margin:0 0 14px}
/* live wired frame */
.live-wrap{margin-top:4px}
.live-bar{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);margin-bottom:10px}
.live-bar .lb-dot{width:8px;height:8px;border-radius:50%;flex:none}
.live-bar .lb-t{font-weight:500;color:var(--text)}
.live-bar .lb-open{margin-left:auto;color:var(--muted);text-decoration:none;font-weight:500}
.live-bar .lb-open:hover{color:var(--text)}
.live-frame{position:relative;border:.5px solid var(--border);border-radius:var(--radius);background:var(--surface);
  overflow:hidden;min-height:340px;padding:20px 22px}
.live-frame iframe{width:100%;border:0;display:block;height:340px;opacity:0;transition:opacity .25s ease}
.live-frame.ready iframe{opacity:1}
.live-frame .frame-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--hint);font-size:13px;gap:9px}
.live-frame .frame-load::before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid var(--border);
  border-top-color:var(--hint);animation:wspin .8s linear infinite}
.live-frame.ready .frame-load{display:none}
@keyframes wspin{to{transform:rotate(360deg)}}
.view-body{display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:stretch}
.view-stat{background:var(--surface-2);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.view-stat .big{font-family:var(--serif);font-size:38px;font-weight:500;color:var(--a);line-height:1}
.view-stat .lbl{font-size:12.5px;color:var(--muted)}
.chart-frame{position:relative;background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);
  padding:20px;display:flex;align-items:center;justify-content:center;min-height:300px;
  background-image:repeating-linear-gradient(135deg,var(--surface) 0 11px,var(--surface-2) 11px 12px)}
.chart-frame canvas{display:block}
.cf-note{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:11px;color:var(--hint)}
.view-foot{margin-top:18px}
.vf-source{font-size:13px;color:var(--muted);background:var(--surface-2);border-radius:var(--radius-sm);padding:14px 16px}
.vf-source .vf-k{display:block;font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:4px}
.vf-source code{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:var(--surface-3);padding:1px 6px;border-radius:5px}
.readon{margin-top:40px}
.ro-head{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);margin-bottom:14px}
.ro-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ro-card{display:flex;flex-direction:column;gap:4px;text-decoration:none;border:.5px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;background:var(--surface);transition:background .14s}
.ro-card:hover{background:var(--surface-2)}
.ro-t{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--a)}
.ro-o{font-size:12.5px;color:var(--muted);line-height:1.45}

/* ---------- AUDIT ---------- */
.audit-hero{max-width:760px;margin-bottom:34px}
.audit-hero h1{font-family:var(--serif);font-weight:500;font-size:38px;line-height:1.12;letter-spacing:-.01em;margin:0 0 18px}
.audit-hero .lead{font-size:16px;color:var(--muted);max-width:70ch;margin:0}
.ba{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:44px}
.ba-col{display:flex;flex-direction:column}
.ba-tag{align-self:flex-start;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  background:var(--surface-2);border-radius:999px;padding:5px 13px;margin-bottom:12px}
.ba-tag.on{color:var(--bg);background:var(--text)}
.ba-frame{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:16px;flex:1}
.before .ba-frame{max-height:430px;overflow:hidden;position:relative}
.before .ba-frame::after{content:"";position:absolute;left:0;right:0;bottom:0;height:60px;background:linear-gradient(transparent,var(--surface))}
.ba-grp{font-size:9.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--hint);margin:12px 0 5px 4px}
.ba-grp:first-child{margin-top:0}
.ba-row{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);padding:5px 6px}
.ba-row .bm{font-variant-numeric:tabular-nums;font-size:9px;font-weight:600;color:var(--hint);width:18px;text-align:center;flex:none}
.ba-sec{margin-bottom:13px;padding-left:11px;border-left:2.5px solid var(--a)}
.ba-sh{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.ba-sn{font-family:var(--sans);font-variant-numeric:tabular-nums;font-size:10px;font-weight:600;color:var(--a)}
.ba-sq{font-family:var(--sans);font-size:11px;font-weight:400;color:var(--hint);width:100%}
.ba-vs{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.ba-v{font-size:11px;color:var(--muted);background:var(--surface-2);border-radius:999px;padding:3px 9px}
.ba-cap{font-size:12px;color:var(--hint);margin:12px 2px 0;line-height:1.5}
.prob-head{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);margin-bottom:18px}
.probs{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px}
.prob{display:flex;gap:14px;align-items:flex-start}
.prob .pn{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--s-red);line-height:1;flex:none;width:26px}
.prob h4{font-size:15px;font-weight:600;margin:0 0 4px}
.prob p{font-size:13px;color:var(--muted);margin:0;line-height:1.5}

/* ---------- STANDARD PAGE ---------- */
.page-hero{max-width:720px;margin-bottom:30px}
.page-hero .pk{font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--hint);margin:0 0 12px}
.page-hero h1{font-family:var(--serif);font-weight:500;font-size:40px;line-height:1.1;letter-spacing:-.01em;margin:0}
.page-body{max-width:680px}
.page-body h3{font-family:var(--serif);font-weight:500;font-size:21px;margin:30px 0 8px}
.page-body p{font-size:15.5px;color:var(--muted);line-height:1.65;margin:0 0 6px}
.page-body p a,.page-body li a{color:var(--text);text-decoration:none;border-bottom:1px solid var(--border)}
.page-body p a:hover,.page-body li a:hover{border-color:var(--text)}
.page-body code{font-family:ui-monospace,Menlo,monospace;font-size:13px;background:var(--surface-2);padding:1px 6px;border-radius:5px;color:var(--text)}
.page-body ul{margin:10px 0 6px;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
.page-body li{position:relative;padding-left:20px;font-size:15px;color:var(--muted);line-height:1.55}
.page-body li::before{content:"";position:absolute;left:3px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--s-amber)}
.page-body li b{color:var(--text);font-weight:600}

/* ---------- SITE FOOTER ---------- */
#sitefoot{margin-top:70px;padding-top:34px;border-top:.5px solid var(--border)}
.foot-top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:28px;margin-bottom:30px}
.foot-brand .fb-mark{font-size:20px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.foot-brand .fb-mark span{font-size:22px}
.foot-brand p{font-size:13px;color:var(--muted);line-height:1.6;margin:12px 0 0;max-width:34ch}
.foot-col h4{font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--hint);margin:0 0 12px}
.foot-col a{display:block;font-size:13px;color:var(--muted);text-decoration:none;padding:3px 0;line-height:1.5}
.foot-col a:hover{color:var(--text)}
.foot-bot{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;
  padding:18px 0 6px;border-top:.5px solid var(--border-2);font-size:11.5px;color:var(--hint);line-height:1.6}
.foot-bot .fb-meta{max-width:64ch}
.foot-bot .fb-copy{white-space:nowrap}
@media (max-width:760px){
  .foot-top{grid-template-columns:1fr 1fr;gap:22px}
  .foot-brand{grid-column:1 / -1}
}

/* ---------- mobile ---------- */
.topbar{display:none}
.tabbar{display:none}
#scrim{display:none}
@media (max-width:900px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;top:0;left:0;bottom:0;width:280px;transform:translateX(-100%);transition:transform .22s ease;
    box-shadow:0 0 40px rgba(0,0,0,.12)}
  body.nav-open .side{transform:none}
  #scrim{display:block;position:fixed;inset:0;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s;z-index:35}
  body.nav-open #scrim{opacity:1;pointer-events:auto}
  .topbar{display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:30;background:color-mix(in oklch,var(--bg) 88%,transparent);
    backdrop-filter:saturate(1.4) blur(10px);-webkit-backdrop-filter:saturate(1.4) blur(10px);
    border-bottom:.5px solid var(--border);padding:11px 14px}
  .topbar .mb{font:inherit;font-size:21px;line-height:1;border:none;background:none;cursor:pointer;color:var(--text);
    padding:4px 8px;border-radius:8px}
  .topbar .mb:active{background:var(--surface-2)}
  .topbar .mb.back{display:none;font-size:30px;font-weight:300;width:34px}
  body.show-back .topbar .mb.back{display:block}
  body.show-back .topbar .mb#menuBtn{display:none}
  .topbar .tb-brand{font-size:16px;font-weight:600;text-decoration:none;color:var(--text)}
  .topbar .tb-brand small{color:var(--hint);font-weight:400;font-size:11px;margin-left:6px}
  .content-inner{padding:24px 18px 96px}
  .home-hero{margin-bottom:34px}
  .home-hero h1{font-size:33px}
  .home-hero .lead{font-size:15.5px}
